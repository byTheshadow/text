<div id="bb-extension-settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>🦴 骨与血 (Bone & Blood)</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <!-- 开关 -->
      <div class="bb-ext-row">
        <label class="checkbox_label" for="bb-enabled">
          <input id="bb-enabled" type="checkbox" checked />
          <span>启用插件</span>
        </label>
      </div>

      <hr />

      <!-- 副API配置 -->
      <h4>📡 副 API 配置</h4>

      <div class="bb-ext-row">
        <label for="bb-api-endpoint">API Endpoint:</label>
        <input id="bb-api-endpoint" type="text" class="text_pole" placeholder="https://api.openai.com/v1/chat/completions" />
      </div>

      <div class="bb-ext-row">
        <label for="bb-api-key">API Key:</label>
        <input id="bb-api-key" type="password" class="text_pole" placeholder="sk-..." />
      </div>

      <div class="bb-ext-row">
        <label for="bb-api-model">Model:</label>
        <input id="bb-api-model" type="text" class="text_pole" placeholder="gpt-4o-mini" />
      </div>

      <hr />

      <!-- 自动生成设置 -->
      <h4>⚙️ 自动生成</h4>

      <div class="bb-ext-row">
        <label for="bb-diary-trigger">每隔多少条消息自动生成日记/总结:</label>
        <input id="bb-diary-trigger" type="number" class="text_pole" min="10" max="200" value="30" />
      </div>

      <div class="bb-ext-row">
        <label class="checkbox_label" for="bb-auto-diary">
          <input id="bb-auto-diary" type="checkbox" checked />
          <span>启用自动日记</span>
        </label>
      </div>

      <hr />

      <!-- 手动操作 -->
      <h4>🔧 手动操作</h4>
      <div class="bb-ext-row bb-ext-buttons">
        <input id="bb-btn-diary" class="menu_button" type="button" value="📖 立即生成日记" />
        <input id="bb-btn-summary" class="menu_button" type="button" value="📜 立即生成总结" />
        <input id="bb-btn-weather" class="menu_button" type="button" value="☁️ 刷新环境" />
      </div>

      <hr />

      <div class="bb-ext-row">
        <span class="bb-ext-hint">💡 点击右下角 🦴 按钮打开主面板</span>
      </div>
    </div>
  </div>
</div>
